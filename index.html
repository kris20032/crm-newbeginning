<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Zawsze świeża wersja: bez tego zespół (nietechniczny) widzi starą stronę po zmianach (np. brak nowego przycisku resetu hasła) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>CRM — New Beginning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=101" />
</head>
<body>
  <!-- ===== Pasek trybu DEMO ===== -->
  <div id="demo-banner" class="demo-banner" hidden>
    TRYB DEMO — to dane przykładowe, zmiany NIE są zapisywane. Podłącz Supabase (config.js), żeby ruszyć na żywo.
  </div>

  <!-- ===== Ekran logowania (tylko tryb na żywo) ===== -->
  <div id="login-view" class="login-view" hidden>
    <form id="login-form" class="login-card">
      <h1>CRM — New Beginning</h1>
      <p class="login-sub">Zaloguj się swoim adresem e-mail</p>
      <input type="email" id="login-email" placeholder="e-mail" autocomplete="email" required />
      <input type="password" id="login-password" placeholder="hasło" autocomplete="current-password" required />
      <button type="submit" id="login-btn">Zaloguj</button>
      <button type="button" id="forgot-link" class="link-btn">Nie pamiętasz hasła?</button>
      <div id="login-error" class="login-error"></div>
    </form>
  </div>

  <!-- ===== Ekran ustawiania nowego hasła (po kliknięciu w link z maila) ===== -->
  <div id="recovery-view" class="login-view" hidden>
    <form id="recovery-form" class="login-card">
      <h1>Ustaw nowe hasło</h1>
      <p class="login-sub">Wpisz nowe hasło do swojego konta</p>
      <input type="password" id="recovery-password" placeholder="nowe hasło (min. 6 znaków)" autocomplete="new-password" minlength="6" required />
      <button type="submit" id="recovery-btn">Zapisz nowe hasło</button>
      <div id="recovery-msg" class="login-error"></div>
    </form>
  </div>

  <!-- ===== Aplikacja ===== -->
  <div id="app-view" hidden>
    <header class="topbar">
      <div class="topbar-left">
        <span class="logo">CRM</span>
        <span class="logo-sub">New Beginning</span>
      </div>
      <div class="topbar-center">
        <input id="search" class="search" type="search" placeholder="Szukaj klienta, firmy, telefonu..." />
      </div>
      <div class="topbar-right">
        <button id="new-card-btn" class="primary-btn sm">+ Nowa karta</button>
        <div class="notif-wrap">
          <button id="notif-bell" class="notif-bell" title="Powiadomienia (@oznaczenia)" aria-label="Powiadomienia">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span id="notif-badge" class="notif-badge" hidden>0</span>
          </button>
          <div id="notif-panel" class="notif-panel" hidden></div>
        </div>
        <!-- Konto (ludzik) — rozwijana lista z opcją Wyloguj -->
        <div class="menu-wrap">
          <button id="account-btn" class="notif-bell" type="button" title="Konto i ustawienia" aria-label="Konto i ustawienia">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
          </button>
          <div id="account-menu" class="pop-menu" hidden>
            <div class="pop-menu-head" id="account-name"></div>
            <button type="button" class="pop-menu-item" id="logout-item">Wyloguj</button>
          </div>
        </div>
        <!-- Sekcje (hamburger) — rozwijana lista: Sprzedaż / Baza partnerów (klucz „klienci" bez zmian) / Panel admina -->
        <div class="menu-wrap">
          <button id="nav-toggle" class="notif-bell" type="button" title="Sekcje" aria-label="Sekcje">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div id="nav-menu" class="pop-menu" hidden>
            <button type="button" class="pop-menu-item active" data-section="sprzedaz">Sprzedaż</button>
            <button type="button" class="pop-menu-item" data-section="klienci">Baza partnerów</button>
            <!-- Panel admina — odsłaniany w applyRbacGating tylko dla uprawnionych (section.admin / rola admin) -->
            <button type="button" class="pop-menu-item" data-section="admin" hidden>Panel admina</button>
          </div>
        </div>
      </div>
    </header>

    <nav id="tabs" class="tabs"></nav>

    <main id="board" class="board"></main>

    <!-- Sekcja Baza partnerów (id/klucz „klienci" bez zmian; render w JS: renderKlienci) -->
    <section id="klienci-view" class="section-view" hidden></section>

    <!-- Sekcja Panel admina (render w JS: renderAdmin) -->
    <section id="admin-view" class="section-view" hidden></section>
  </div>

  <!-- ===== Modal karty klienta ===== -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-actions" id="modal-actions">
        <button id="modal-prev" class="modal-nav-btn" type="button" aria-label="Poprzedni klient" title="Poprzedni klient (←)">&lsaquo;</button>
        <button id="modal-next" class="modal-nav-btn" type="button" aria-label="Następny klient" title="Następny klient (→)">&rsaquo;</button>
        <button id="modal-close" class="modal-close" type="button" aria-label="Zamknij" title="Zamknij (Esc)">&times;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Supabase JS (używane tylko gdy skonfigurowane) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=92"></script>
  <script src="app.js?v=104"></script>
  <!-- Nakładka językowa EN (dla Matheo/Hiszpania). Ładowana OSTATNIA i izolowana:
       błąd tu NIE zatrzyma app.js. Domyślnie PL (tylko przycisk). Cofnięcie = usuń tę linię. -->
  <script src="i18n.js?v=100"></script>
</body>
</html>
